<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="importmap">
      {
        "imports": {
          "alpinejs": "https://esm.sh/alpinejs@3.15.8",
          "p-memoize": "https://esm.sh/p-memoize@8.0.0",
          "p-retry": "https://esm.sh/p-retry@7.1.1",
          "p-queue": "https://esm.sh/p-queue@9.1.0",
          "p-throttle": "https://esm.sh/p-throttle@8.1.0",
          "valibot": "https://esm.sh/valibot@1.2.0",
          "idb-keyval": "https://esm.sh/idb-keyval@6.2.2",
          "fuse.js": "https://esm.sh/fuse.js@7.1.0",
          "dayjs": "https://esm.sh/dayjs@1.11.20",
          "dayjs/plugin/relativeTime": "https://esm.sh/dayjs@1.11.20/plugin/relativeTime",
          "dayjs/locale/ru": "https://esm.sh/dayjs@1.11.20/locale/ru",
          "@bwip-js/browser": "https://esm.sh/@bwip-js/browser@4.8.0",
          "tinygesture": "https://esm.sh/tinygesture@3.0.0"
        }
      }
    </script>
    <style>
      @layer reset, tokens, base, layout, components, utilities, keyframes;

      @layer reset {
        *,
        *::before,
        *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          -webkit-tap-highlight-color: transparent;
          -webkit-touch-callout: none;
          -webkit-user-select: none;
          user-select: none;
        }
        @media (prefers-reduced-motion: reduce) {
          *,
          *::before,
          *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
          }
        }
      }

      @layer tokens {
        :root {
          --color-surface: var(--tg-theme-bg-color);
          --color-surface-container: var(--tg-theme-secondary-bg-color);
          --color-surface-container-high: color-mix(
            in srgb,
            var(--color-surface-container) 94%,
            #fff 6%
          );
          --color-on-surface: var(--tg-theme-text-color);
          --color-on-surface-variant: var(--tg-theme-hint-color);
          --color-primary: var(--tg-theme-button-color);
          --color-on-primary: var(--tg-theme-button-text-color);
          --color-error: var(--tg-theme-destructive-text-color);
          --color-success: #7dd891;
          --color-warning: #f0b866;
          --color-outline: color-mix(
            in srgb,
            var(--color-on-surface) 14%,
            transparent
          );
          --color-outline-variant: color-mix(
            in srgb,
            var(--color-on-surface) 7%,
            transparent
          );
          --state-hover: color-mix(
            in srgb,
            var(--color-on-surface) 8%,
            transparent
          );
          --state-pressed: color-mix(
            in srgb,
            var(--color-on-surface) 12%,
            transparent
          );
          --radius-xs: 4px;
          --radius-sm: 8px;
          --radius-md: 12px;
          --radius-lg: 16px;
          --radius-xl: 28px;
          --radius-full: 9999px;
          --motion-standard: cubic-bezier(0.2, 0, 0, 1);
          --motion-decelerate: cubic-bezier(0, 0, 0, 1);
          --motion-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
          --font-sans: "Google Sans", system-ui, sans-serif;
          --font-mono: "Google Sans Mono", ui-monospace, monospace;
          --inset-top: env(safe-area-inset-top, 0px);
          --inset-bottom: env(safe-area-inset-bottom, 0px);
          --action-bar-height: 72px;
        }
      }

      @layer base {
        html {
          background: var(--color-surface);
          color: var(--color-on-surface);
          font-family: var(--font-sans);
          -webkit-font-smoothing: antialiased;
          text-rendering: optimizeLegibility;
        }
        body {
          display: flex;
          flex-direction: column;
          min-block-size: 100dvh;
          overflow-x: hidden;
          overscroll-behavior: none;
          scrollbar-width: none;
        }
        body::-webkit-scrollbar {
          display: none;
        }
        [x-cloak] {
          display: none !important;
        }
      }

      @layer layout {
        .page {
          display: flex;
          flex-direction: column;
          flex: 1;
          width: 100%;
          max-inline-size: 28rem;
          margin-inline: auto;
          padding-inline: 1rem;
        }
        .page--center {
          align-items: center;
          justify-content: center;
          min-block-size: 100dvh;
          padding-block: var(--inset-top) var(--inset-bottom);
        }
      }

      @layer components {
        .top-bar {
          position: fixed;
          inset-block-start: 0;
          inset-inline: 0;
          z-index: 30;
          padding-block-start: var(--inset-top);
          padding-inline: 1rem;
          background: color-mix(in srgb, var(--color-surface) 75%, transparent);
          backdrop-filter: blur(20px) saturate(1.4);
          -webkit-backdrop-filter: blur(20px) saturate(1.4);
          border-block-end: 1px solid var(--color-outline-variant);
        }
        .top-bar__inner {
          max-inline-size: 28rem;
          margin-inline: auto;
        }
        .top-bar-spacer {
          block-size: calc(var(--inset-top) + 6.5rem);
        }
        .top-bar-spacer--expanded {
          block-size: calc(var(--inset-top) + 12rem);
        }

        .app-header {
          display: flex;
          flex-direction: column;
          align-items: center;
          padding-block: 1.5rem 1rem;
          animation: fade-in 200ms var(--motion-standard) both;
        }
        .app-header__title {
          font-size: 1.75rem;
          font-weight: 700;
          letter-spacing: -0.02em;
          line-height: 1;
        }
        .app-header__subtitle {
          margin-block-start: 0.25rem;
          font-size: 0.6875rem;
          font-weight: 500;
          letter-spacing: 0.05em;
          color: var(--color-on-surface-variant);
          text-transform: lowercase;
        }

        .toolbar {
          display: flex;
          justify-content: center;
          margin-block-end: 0.625rem;
        }
        .counter-pill {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 6px 14px;
          border: 1px solid var(--color-outline-variant);
          border-radius: var(--radius-full);
          font-size: 0.8125rem;
          font-weight: 500;
          color: var(--color-on-surface-variant);
        }
        .counter-pill strong {
          color: var(--color-on-surface);
        }

        .search-bar {
          position: relative;
          padding-block-end: 0.625rem;
        }
        .search-bar__icon {
          position: absolute;
          inset-block-start: 50%;
          inset-inline-start: 0.75rem;
          translate: 0 calc(-50% - 0.3125rem);
          color: var(--color-on-surface-variant);
          pointer-events: none;
        }
        .search-bar__input {
          width: 100%;
          padding: 0.625rem 2.75rem 0.625rem 2.5rem;
          border: 1px solid var(--color-outline-variant);
          border-radius: var(--radius-md);
          background: var(--color-surface-container);
          color: var(--color-on-surface);
          font-family: var(--font-sans);
          font-size: 0.875rem;
          outline: none;
          -webkit-user-select: text;
          user-select: text;
          transition: border-color 200ms var(--motion-standard);
        }
        .search-bar__input::placeholder {
          color: var(--color-on-surface-variant);
        }
        .search-bar__input:focus {
          border-color: var(--color-primary);
        }
        .search-bar__input::-webkit-search-cancel-button {
          display: none;
        }
        .search-bar__clear {
          position: absolute;
          inset-block-start: 50%;
          inset-inline-end: 0.375rem;
          translate: 0 calc(-50% - 0.3125rem);
          display: inline-flex;
          align-items: center;
          justify-content: center;
          inline-size: 28px;
          block-size: 28px;
          border: none;
          border-radius: var(--radius-full);
          background: transparent;
          color: var(--color-on-surface-variant);
          cursor: pointer;
          touch-action: manipulation;
        }
        .search-bar__clear:active {
          background: var(--state-pressed);
        }

        .content-area {
          flex: 1;
          padding-block-end: calc(
            var(--inset-bottom) + var(--action-bar-height) + 8px
          );
        }

        .empty-state {
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 100%;
          padding: 3.5rem 2rem;
          border: 1px solid var(--color-outline-variant);
          border-radius: var(--radius-xl);
          background: var(--color-surface-container);
          text-align: center;
        }
        .empty-state__icon {
          display: flex;
          align-items: center;
          justify-content: center;
          inline-size: 80px;
          block-size: 80px;
          border-radius: var(--radius-xl);
        }
        .empty-state__icon--muted {
          border: 1px solid var(--color-outline-variant);
          background: var(--color-surface);
        }
        .empty-state__icon--error {
          border: 1px solid
            color-mix(in srgb, var(--color-error) 18%, transparent);
          background: color-mix(in srgb, var(--color-error) 6%, transparent);
        }
        .empty-state__title {
          margin-block-start: 1.75rem;
          font-size: 1.0625rem;
          font-weight: 600;
          text-wrap: balance;
        }
        .empty-state__title--error {
          color: var(--color-error);
        }
        .empty-state__description {
          margin-block-start: 0.5rem;
          max-inline-size: 16rem;
          font-size: 0.875rem;
          line-height: 1.45;
          color: var(--color-on-surface-variant);
          text-wrap: balance;
        }
        .empty-state__badges {
          display: inline-flex;
          align-items: center;
          gap: 10px;
          margin-block-start: 1.5rem;
        }
        .empty-state__action {
          margin-block-start: 1.75rem;
        }

        .barcode-card {
          position: relative;
          overflow: hidden;
          border: 1px solid var(--color-outline-variant);
          border-radius: var(--radius-lg);
          background: var(--color-surface-container);
        }
        .barcode-card::after {
          content: "";
          position: absolute;
          inset: 0;
          border-radius: inherit;
          background: var(--color-on-surface);
          opacity: 0;
          pointer-events: none;
          transition: opacity 160ms var(--motion-standard);
        }
        .barcode-card:active::after {
          opacity: 0.04;
        }

        .swipe-wrapper {
          position: relative;
          overflow: hidden;
          border-radius: var(--radius-lg);
        }
        [role="list"] > li + li > .swipe-wrapper {
          margin-block-start: 0.75rem;
        }
        .swipe-wrapper__delete {
          position: absolute;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          padding-inline-end: 1.5rem;
          background: color-mix(
            in srgb,
            var(--color-error) 15%,
            var(--color-surface-container)
          );
          border-radius: var(--radius-lg);
          color: var(--color-error);
          font-size: 0.8125rem;
          font-weight: 500;
          gap: 8px;
          pointer-events: none;
        }
        .swipe-wrapper .barcode-card {
          position: relative;
          z-index: 1;
          transition: transform 120ms var(--motion-standard);
          margin: 0;
        }

        .barcode-card__header {
          display: flex;
          align-items: flex-start;
          gap: 0.625rem;
          padding: 0.875rem 0.5rem 0.75rem 1rem;
        }
        .barcode-card__body {
          display: flex;
          flex-direction: column;
          flex: 1;
          min-inline-size: 0;
          gap: 0.25rem;
        }
        .barcode-card__actions {
          display: flex;
          flex-direction: row;
          align-items: center;
          flex-shrink: 0;
        }
        .barcode-card__code {
          display: block;
          width: 100%;
          border: none;
          background: none;
          cursor: pointer;
          text-align: start;
          font-family: var(--font-mono);
          font-size: 1.125rem;
          font-weight: 500;
          font-variant-numeric: tabular-nums;
          letter-spacing: 0.03em;
          line-height: 1.3;
          color: var(--color-on-surface);
          touch-action: manipulation;
          transition: opacity 120ms var(--motion-standard);
        }
        .barcode-card__code:active {
          opacity: 0.5;
        }
        .barcode-card__name {
          border: none;
          background: none;
          cursor: pointer;
          padding: 0;
          text-align: start;
          font-family: var(--font-sans);
          font-size: 0.8125rem;
          font-weight: 500;
          line-height: 1.3;
          color: var(--color-primary);
          touch-action: manipulation;
          transition: opacity 120ms var(--motion-standard);
        }
        .barcode-card__name:active {
          opacity: 0.55;
        }
        .barcode-card__meta {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          gap: 0.25rem;
          margin-block-start: 0.125rem;
        }
        .barcode-card__timestamp {
          font-family: var(--font-mono);
          font-size: 0.625rem;
          font-variant-numeric: tabular-nums;
          color: var(--color-on-surface-variant);
          opacity: 0.6;
          margin-block-start: 0.125rem;
        }

        .divider {
          block-size: 1px;
          background: var(--color-outline-variant);
        }

        .render-zone {
          position: relative;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #fff;
          overflow: hidden;
          transition: background 200ms var(--motion-standard);
        }
        .render-zone canvas {
          display: block;
          image-rendering: pixelated;
          transition: filter 200ms var(--motion-standard);
        }
        .render-zone--qr {
          padding: 14px 16px;
          min-block-size: 152px;
        }
        .render-zone--qr canvas {
          border-radius: var(--radius-xs);
        }
        .render-zone--barcode {
          border-radius: 0 0 calc(var(--radius-lg) - 1px)
            calc(var(--radius-lg) - 1px);
          padding: 14px 20px 16px;
          min-block-size: 96px;
        }
        .render-zone--dark {
          background: #1a1a1a;
        }
        .render-zone--dark canvas {
          filter: invert(1);
        }
        .render-zone__skeleton {
          position: absolute;
          inset: 10px;
          border-radius: var(--radius-sm);
          background: linear-gradient(
            90deg,
            color-mix(
                in srgb,
                var(--color-on-surface) 6%,
                var(--color-surface-container)
              )
              25%,
            color-mix(
                in srgb,
                var(--color-on-surface) 12%,
                var(--color-surface-container)
              )
              50%,
            color-mix(
                in srgb,
                var(--color-on-surface) 6%,
                var(--color-surface-container)
              )
              75%
          );
          background-size: 200% 100%;
          animation: shimmer 1.5s ease-in-out infinite;
        }
        .render-zone--dark .render-zone__skeleton {
          background: linear-gradient(90deg, #222 25%, #2a2a2a 50%, #222 75%);
          background-size: 200% 100%;
        }
        .render-zone__error {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 4px;
          color: #aaa;
          font-size: 0.6875rem;
          font-weight: 500;
        }
        .render-zone--dark .render-zone__error {
          color: #888;
        }

        .icon-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          flex-shrink: 0;
          inline-size: 34px;
          block-size: 34px;
          border: none;
          border-radius: var(--radius-full);
          background: transparent;
          color: inherit;
          cursor: pointer;
          touch-action: manipulation;
          transition:
            background 160ms var(--motion-standard),
            transform 120ms var(--motion-spring);
        }
        .icon-button:hover {
          background: var(--state-hover);
        }
        .icon-button:active {
          background: var(--state-pressed);
          transform: scale(0.88);
        }
        .icon-button--muted {
          color: var(--color-on-surface-variant);
        }
        .icon-button--warm {
          color: var(--color-warning);
        }
        .icon-button--warm:hover {
          background: color-mix(in srgb, var(--color-warning) 10%, transparent);
        }
        .icon-button--warm:active {
          background: color-mix(in srgb, var(--color-warning) 14%, transparent);
        }

        .badge {
          display: inline-flex;
          align-items: center;
          flex-shrink: 0;
          block-size: 22px;
          padding-inline: 8px;
          border: 1px solid transparent;
          border-radius: 6px;
          font-size: 0.5625rem;
          font-weight: 600;
          letter-spacing: 0.05em;
          text-transform: uppercase;
        }
        .badge--ean8 {
          border-color: color-mix(
            in srgb,
            var(--color-primary) 22%,
            transparent
          );
          background: color-mix(in srgb, var(--color-primary) 10%, transparent);
          color: var(--color-primary);
          font-family: var(--font-mono);
        }
        .badge--ean13 {
          border-color: color-mix(
            in srgb,
            var(--color-success) 22%,
            transparent
          );
          background: color-mix(in srgb, var(--color-success) 10%, transparent);
          color: var(--color-success);
          font-family: var(--font-mono);
        }
        .badge--price {
          border-color: color-mix(
            in srgb,
            var(--color-success) 18%,
            transparent
          );
          background: color-mix(in srgb, var(--color-success) 8%, transparent);
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 0;
          text-transform: none;
          color: var(--color-success);
        }
        .badge--date {
          border-color: color-mix(
            in srgb,
            var(--color-warning) 18%,
            transparent
          );
          background: color-mix(in srgb, var(--color-warning) 8%, transparent);
          font-family: var(--font-mono);
          font-size: 0.625rem;
          letter-spacing: 0;
          text-transform: none;
          color: var(--color-warning);
        }

        .filled-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          padding: 12px 24px;
          border: none;
          border-radius: var(--radius-full);
          background: var(--color-primary);
          color: var(--color-on-primary);
          font-family: var(--font-sans);
          font-size: 0.875rem;
          font-weight: 500;
          cursor: pointer;
          touch-action: manipulation;
          transition:
            opacity 160ms var(--motion-standard),
            transform 100ms var(--motion-spring);
        }
        .filled-button:active {
          transform: scale(0.96);
          opacity: 0.85;
        }

        .ghost-button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          padding: 10px 20px;
          border: 1px solid
            color-mix(in srgb, var(--color-error) 20%, transparent);
          border-radius: var(--radius-full);
          background: transparent;
          color: var(--color-error);
          font-family: var(--font-sans);
          font-size: 0.8125rem;
          font-weight: 500;
          cursor: pointer;
          touch-action: manipulation;
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          transition:
            background 160ms var(--motion-standard),
            transform 100ms var(--motion-spring);
        }
        .ghost-button:active {
          background: color-mix(in srgb, var(--color-error) 10%, transparent);
          transform: scale(0.96);
        }

        .action-bar {
          position: fixed;
          inset-inline: 0;
          inset-block-end: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 12px;
          padding: 12px 20px calc(var(--inset-bottom) + 12px);
          z-index: 40;
          pointer-events: none;
        }
        .action-bar > * {
          pointer-events: auto;
        }

        .scan-group {
          display: inline-flex;
          border-radius: var(--radius-full);
          overflow: hidden;
          box-shadow: 0 2px 12px color-mix(in srgb, #000 20%, transparent);
        }
        .scan-group__toggle {
          display: flex;
          align-items: center;
          justify-content: center;
          inline-size: 48px;
          border: none;
          background: color-mix(in srgb, var(--color-primary) 15%, transparent);
          color: var(--color-primary);
          cursor: pointer;
          touch-action: manipulation;
          transition:
            background 200ms var(--motion-standard),
            color 200ms var(--motion-standard);
          border-inline-end: 1px solid
            color-mix(in srgb, var(--color-primary) 20%, transparent);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
        }
        .scan-group__toggle:active {
          background: color-mix(in srgb, var(--color-primary) 25%, transparent);
        }
        .scan-group__toggle--active {
          background: var(--color-primary);
          color: var(--color-on-primary);
          border-inline-end-color: color-mix(
            in srgb,
            var(--color-on-primary) 20%,
            transparent
          );
        }
        .scan-group__toggle--active:active {
          opacity: 0.85;
        }
        .scan-group__button {
          display: flex;
          align-items: center;
          gap: 8px;
          padding: 14px 22px 14px 16px;
          border: none;
          background: var(--color-primary);
          color: var(--color-on-primary);
          font-family: var(--font-sans);
          font-size: 0.875rem;
          font-weight: 500;
          cursor: pointer;
          touch-action: manipulation;
          transition: opacity 160ms var(--motion-standard);
        }
        .scan-group__button:active {
          opacity: 0.85;
        }

        .toast-container {
          position: fixed;
          inset-block-end: calc(
            var(--inset-bottom) + var(--action-bar-height) + 16px
          );
          inset-inline-start: 50%;
          translate: -50% 0;
          z-index: 50;
        }
        .toast {
          padding: 0.75rem 1.25rem;
          border: 1px solid var(--color-outline);
          border-radius: var(--radius-md);
          background: var(--color-surface-container-high);
          box-shadow:
            0 4px 12px color-mix(in srgb, #000 25%, transparent),
            0 8px 28px color-mix(in srgb, #000 15%, transparent);
        }
        .toast__inner {
          display: flex;
          align-items: center;
          gap: 0.75rem;
          white-space: nowrap;
        }
        .toast__message {
          font-size: 0.875rem;
          font-weight: 500;
        }

          border-radius: var(--radius-sm);
          background: linear-gradient(
            90deg,
            color-mix(
                in srgb,
                var(--color-on-surface) 6%,
                var(--color-surface-container)
              )
              25%,
            color-mix(
                in srgb,
                var(--color-on-surface) 12%,
                var(--color-surface-container)
              )
              50%,
            color-mix(
                in srgb,
                var(--color-on-surface) 6%,
                var(--color-surface-container)
              )
              75%
          );
          background-size: 200% 100%;
          animation: shimmer 1.5s ease-in-out infinite;

          block-size: 1.25rem;
          inline-size: 11rem;

          block-size: 1rem;
          inline-size: 7rem;

          inline-size: 2.5rem;
          border-radius: var(--radius-full);
        }
        .skeleton--panel {
          block-size: 5rem;

            calc(var(--radius-lg) - 1px);
        }
      }

      @layer utilities {
        .anim-fade {
          animation: fade-in 200ms var(--motion-standard) both;
        }
        .anim-slide {
          animation: slide-up 280ms var(--motion-decelerate) both;
        }
        .anim-breathe {
          animation: breathe 3.5s ease-in-out infinite;
        }
        .anim-card-in {
          animation: card-in 260ms var(--motion-spring) var(--d, 0ms) both;
        }
        .transition-enter,
        .transition-leave {
          transition:
            opacity 180ms var(--motion-standard),
            transform 180ms var(--motion-spring);
        }
        .transition-from {
          opacity: 0;
          transform: scale(0.92) translateY(6px);
        }
        .transition-to {
          opacity: 1;
          transform: none;
        }
      }

      @layer keyframes {
        @keyframes fade-in {
          from {
            opacity: 0;
          }
        }
        @keyframes slide-up {
          from {
            opacity: 0;
            transform: translateY(16px);
          }
        }
        @keyframes shimmer {
          from {
            background-position: 200% 0;
          }
          to {
            background-position: -200% 0;
          }
        }
        @keyframes breathe {
          0%,
          100% {
            opacity: 1;
            scale: 1;
          }
          50% {
            opacity: 0.6;
            scale: 0.9;
          }
        }
        @keyframes card-in {
          from {
            opacity: 0;
            transform: translateY(12px) scale(0.97);
          }
        }
        @keyframes card-out {
          to {
            opacity: 0;
            transform: translateX(-20px) scale(0.95);
          }
        }
      }

                            x-show="item._bcOk"
                          ></canvas>
                        </div>
                      </div>
                    </div>
                  </li>
                </template>
              </ul>
            </div>
          </template>
        </section>
      </main>
    </template>

    <template x-if="hasAccess && !isSearchFocused && !isLoading">
      <div class="action-bar" x-cloak>
        <button
          type="button"
          class="ghost-button"
          x-show="items.length"
          @click="clearAll()"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 6h18" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
          Очистить
        </button>
        <div class="scan-group">
          <button
            type="button"
            class="scan-group__toggle"
            :class="isMultiScan && 'scan-group__toggle--active'"
            @click="toggleMultiScan()"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M17 1l4 4-4 4" />
              <path d="M3 11V9a4 4 0 0 1 4-4h14" />
              <path d="M7 23l-4-4 4-4" />
              <path d="M21 13v2a4 4 0 0 1-4 4H3" />
            </svg>
          </button>
          <button
            type="button"
            class="scan-group__button"
            @click="openScanner()"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 7V5a2 2 0 0 1 2-2h2" />
              <path d="M17 3h2a2 2 0 0 1 2 2v2" />
              <path d="M21 17v2a2 2 0 0 1-2 2h-2" />
              <path d="M7 21H5a2 2 0 0 1-2-2v-2" />
              <path d="M7 12h10" />
            </svg>
            <span x-text="isMultiScan?'Мультискан':'Сканировать'"></span>

    <div class="toast-container">
      <div
        x-cloak
        x-show="toast.on"
        x-transition:enter="transition-enter"
        x-transition:enter-start="transition-from"
        x-transition:enter-end="transition-to"
        x-transition:leave="transition-leave"
        x-transition:leave-start="transition-to"
        x-transition:leave-end="transition-from"
        class="toast"
        role="status"
      >
        <div class="toast__inner">
          <template x-if="toast.type === 'ok'"
            ><svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--color-success)"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m20 6-11 11-5-5" /></svg
          ></template>
          <template x-if="toast.type === 'warn'"
            ><svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--color-warning)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
              />
              <path d="M12 9v4M12 17h.01" /></svg
          ></template>
          <template x-if="toast.type === 'err'"
            ><svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="var(--color-error)"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 8v4M12 16h.01" /></svg
          ></template>
          <span class="toast__message" x-text="toast.msg"></span>
        </div>
      </div>
    </div>

    <script type="module">
      import Alpine from "alpinejs";
      import pMemoize from "p-memoize";
      import pRetry from "p-retry";
      import PQueue from "p-queue";
      import pThrottle from "p-throttle";
      import * as v from "valibot";
      import { get as idbGet, set as idbSet } from "idb-keyval";
      import Fuse from "fuse.js";
      import dayjs from "dayjs";
      import relativeTime from "dayjs/plugin/relativeTime";
      import "dayjs/locale/ru";
      import _bwip from "@bwip-js/browser";
      import TinyGesture from "tinygesture";

      dayjs.extend(relativeTime);
      dayjs.locale("ru");

      const bwipjs = _bwip?.default ?? _bwip;
      const tg = Telegram.WebApp;

      const ALLOWED_IDS = new Set([
        8213389363, 6147483152, 6325657077, 5529530413, 8281918443, 7945600088,
        857386584, 5529530413
      ]);
      const DB_KEY = "control_v3";
      const DB_VERSION = 12;
      const NAME_CACHE_KEY = "control_names_v1";
      const SKELETON_DURATION = 600;
      const TOAST_DURATION = 2400;
      const API_TIMEOUT = 3000;
      const EAN_PATTERN = /^(\d{7,8}|\d{12,13})$/;
      const CEN_PATTERN =
        /^CEN;(\d{7,8}|\d{12,13});(\d+(?:[.,]\d{1,2})?);\d+;\d+;(\d{2}\.\d{2}\.\d{2})(?:;\d+)?$/;

      const debounce = (fn, ms) => {
        let id;
        const d = (...args) => {
          clearTimeout(id);
          id = setTimeout(() => fn(...args), ms);
        };
        d.cancel = () => clearTimeout(id);
        return d;
      };

      const bus = new EventTarget();
      const emit = (type, detail) =>
        bus.dispatchEvent(new CustomEvent(type, { detail }));
      const on = (type, fn) => bus.addEventListener(type, (e) => fn(e.detail));

      const throttledFetch = pThrottle({ limit: 2, interval: 1000 })(
        (url, opts) =>
          fetch(url, {
            signal: AbortSignal.timeout(opts?.timeout ?? API_TIMEOUT),
          }).then((r) => {
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
          }),
      );

      const priceFormatter = new Intl.NumberFormat("ru-RU", {
        maximumFractionDigits: 2,
      });

      const formatTime = (ts) => {
        const date = dayjs(ts);
        return dayjs().diff(date, "day") < 7
          ? date.fromNow()
          : date.format("DD.MM.YYYY HH:mm");
      };

      const dateLabel = (ts) => {
        const d = dayjs(ts);
        const now = dayjs();
        if (now.isSame(d, "day")) return "Сегодня";
        if (now.subtract(1, "day").isSame(d, "day")) return "Вчера";
        return d.format("D MMMM YYYY");
      };

      const formatPrice = (value) =>
        value != null && Number(value) > 0
          ? priceFormatter.format(Number(value))
          : null;

      const computeEanCheckDigit = (code) => {
        const isShort = code.length <= 8;
        const dataLen = isShort ? 7 : 12;
        const digits = code.slice(0, dataLen).padStart(dataLen, "0");
        const sum = [...digits].reduce(
          (acc, char, i) =>
            acc +
            Number(char) *
              (isShort ? (i % 2 === 0 ? 3 : 1) : i % 2 === 0 ? 1 : 3),
          0,
        );
        return digits + String((10 - (sum % 10)) % 10);
      };

      const normalizeCEN = (raw) => raw.replace(/[\s\u00A0\u200B\uFEFF]+/g, "");

      const parseCEN = (raw) => {
        if (typeof raw !== "string") return null;
        const trimmed = normalizeCEN(raw);
        if (!trimmed.startsWith("CEN;")) return null;
        const match = trimmed.match(CEN_PATTERN);
        if (!match) return null;
        const [, code, priceStr, dateStr] = match;
        if (!EAN_PATTERN.test(code)) return null;
        const [dd, mm, yy] = dateStr.split(".").map(Number);
        if (dd < 1 || dd > 31 || mm < 1 || mm > 12 || yy < 0 || yy > 99)
          return null;
        return {
          code: computeEanCheckDigit(code),
          raw: trimmed,
          price: parseFloat(priceStr.replace(",", ".")) || null,
          date: `${String(dd).padStart(2, "0")}.${String(mm).padStart(2, "0")}.${2000 + yy}`,
        };
      };

      const ItemSchema = v.object({
        id: v.string(),
        code: v.string(),
        ts: v.number(),
        raw: v.optional(v.nullable(v.string())),
        price: v.optional(v.nullable(v.string())),
        date: v.optional(v.nullable(v.string())),
        name: v.optional(v.nullable(v.string())),
      });
      const StoreSchema = v.object({
        v: v.literal(DB_VERSION),
        items: v.array(ItemSchema),
      });

      const normalizeItem = (record) => ({
        id: record.id,
        code: record.code.trim(),
        raw: typeof record.raw === "string" ? record.raw.trim() : null,
        ts: record.ts,
        price: record.price != null ? String(record.price) : null,
        date: typeof record.date === "string" ? record.date : null,
        name: typeof record.name === "string" ? record.name : null,
        _qrOk: false,
        _qrErr: false,
        _bcOk: false,
        _bcErr: false,
      });

      const stripRenderFlags = ({ _qrOk, _qrErr, _bcOk, _bcErr, ...rest }) =>
        rest;

      let nameCache = {};

      const loadNameCache = async () => {
        try {
          nameCache = (await idbGet(NAME_CACHE_KEY)) ?? {};
        } catch {
          nameCache = {};
        }
      };

      const persistNameCache = debounce(async () => {
        try {
          await idbSet(NAME_CACHE_KEY, structuredClone(nameCache));
        } catch {}
      }, 2000);

      const flushNameCache = () => {
        persistNameCache.cancel();
        idbSet(NAME_CACHE_KEY, structuredClone(nameCache)).catch(() => {});
      };

      const fetchProductName = pMemoize(async (code) => {
        if (nameCache[code]) return nameCache[code];
        try {
          const data = await pRetry(
            () =>
              throttledFetch(
                `https://world.openfoodfacts.org/api/v2/product/${code}?fields=product_name,product_name_ru`,
              ),
            {
              retries: 2,
              minTimeout: 400,
              maxTimeout: 2000,
              onFailedAttempt: (err) => {
                if (err.name === "AbortError") throw err;
              },
            },
          );
          const name =
            data.status === 1
              ? data.product?.product_name_ru ||
                data.product?.product_name ||
                null
              : null;
          if (name) {
            nameCache[code] = name;
            persistNameCache();
          }
          return name;
        } catch {
          return nameCache[code] ?? null;
        }
      });

      const haptic = (style = "light") => {
        tg.HapticFeedback?.impactOccurred?.(style);
      };
      const notify = (type = "success") => {
        tg.HapticFeedback?.notificationOccurred?.(type);
      };
      const confirmDialog = (msg) =>
        new Promise((resolve) =>
          tg.showConfirm
            ? tg.showConfirm(msg, (ok) => resolve(Boolean(ok)))
            : resolve(true),
        );

      let audioCtx;
      const playSuccessSound = () => {
        try {
          audioCtx ??= new AudioContext();
          const play = (freq, time) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "triangle";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.08, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(time);
            osc.stop(time + 0.15);
          };
          const now = audioCtx.currentTime;
          play(880, now);
          play(1318.5, now + 0.07);
        } catch {}
      };

      const drawQR = (canvas, item) => {
        try {
          bwipjs.toCanvas(canvas, {
            bcid: "qrcode",
            text: (item.raw ?? item.code).trim(),
            scale: 4,
            eclevel: "M",
            padding: 2,
          });
          canvas.style.width = "128px";
          canvas.style.height = "128px";
          item._qrOk = true;
        } catch {
          item._qrErr = true;
        }
      };

      const drawBarcode = (canvas, item) => {
        try {
          bwipjs.toCanvas(canvas, {
            bcid: item.code.length === 8 ? "ean8" : "ean13",
            text: item.code,
            scale: 3,
            height: 14,
            includetext: false,
          });
          canvas.style.width = "100%";
          canvas.style.maxWidth = "280px";
          canvas.style.height = "auto";
          item._bcOk = true;
        } catch {
          item._bcErr = true;
        }
      };

      const lazyRender = (el, fn) => {
        const target = el.closest(".render-zone") ?? el.parentElement;
        const io = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              io.disconnect();
              fn();
            }
          },
          { rootMargin: "200px" },
        );
        io.observe(target);
      };

      Alpine.store("state", {
        items: [],
        toast: { on: false, msg: "", type: "ok" },
        isLoading: true,
        hasAccess: false,
        tick: 0,
        isDarkScheme: tg.colorScheme === "dark",
      });

      const store = () => Alpine.store("state");
      const persistQueue = new PQueue({ concurrency: 1 });
      let toastTimer;
      let tickInterval;
      let fuseInstance = null;
      let fuseItemsRef = null;

      const buildFuse = (items) => {
        if (fuseInstance && fuseItemsRef === items) return fuseInstance;
        fuseInstance = new Fuse(items, {
          keys: [
            { name: "code", weight: 0.6 },
            { name: "name", weight: 0.4 },
          ],
          threshold: 0.3,
          distance: 100,
          minMatchCharLength: 2,
        });
        fuseItemsRef = items;
        return fuseInstance;
      };

      const showToast = (msg, type = "ok") => {
        clearTimeout(toastTimer);
        store().toast = { on: true, msg, type };
        toastTimer = setTimeout(() => {
          store().toast = { ...store().toast, on: false };
        }, TOAST_DURATION);
      };

      const persistItems = async (items) => {
        try {
          await idbSet(DB_KEY, {
            v: DB_VERSION,
            items: items.map(stripRenderFlags),
          });
        } catch {
          showToast("Ошибка сохранения", "err");
        }
      };

      on("barcode:added", ({ id, code }) => {
        fetchProductName(code).then((name) => {
          if (!name) return;
          store().items = store().items.map((item) =>
            item.id === id ? { ...item, name } : item,
          );
          fuseItemsRef = null;
          persistQueue.add(() => persistItems(store().items.slice()));
        });
      });

      on("items:changed", () => {
        fuseItemsRef = null;
      });

      Alpine.data("control", () => ({
        get hasAccess() {
          return store().hasAccess;
        },
        get isLoading() {
          return store().isLoading;
        },
        get items() {
          return store().items;
        },
        get toast() {
          return store().toast;
        },
        get tick() {
          return store().tick;
        },
        get isDarkScheme() {
          return store().isDarkScheme;
        },
        get userName() {
          return tg.initDataUnsafe?.user?.first_name ?? "";
        },

        formatTime,
        dateLabel,
        drawQR,
        drawBarcode,
        lazyRender,
        haptic,
        showToast,
        searchQuery: "",
        _debouncedQuery: "",
        isSearchFocused: false,
        isMultiScan: false,
        isRenderFlipped: false,
        _isScannerOpen: false,
        _searchDebounced: null,
        _swipeObserver: null,
        _cachedEasing: null,
        _backButtonHandler: null,

        get filteredItems() {
          const query = this._debouncedQuery.trim();
          if (!query || query.length < 2) return store().items;
          return buildFuse(store().items)
            .search(query)
            .map((result) => result.item);
        },

        async init() {
          tg.ready();
          tg.requestFullscreen?.();
          tg.disableVerticalSwipes?.();
          this._applyTheme();
          tg.onEvent("themeChanged", () => this._applyTheme());

          store().hasAccess = ALLOWED_IDS.has(
            tg.initDataUnsafe?.user?.id ?? -1,
          );
          if (!store().hasAccess) {
            store().isLoading = false;
            return;
          }

          const loadStartTime = Date.now();
          await loadNameCache();

          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") flushNameCache();
          });

          try {
            let idbTimeoutId;
            const rawData = await Promise.race([
              idbGet(DB_KEY),
              new Promise((_, reject) => {
                idbTimeoutId = setTimeout(
                  () => reject(new Error("idb_timeout")),
                  3000,
                );
              }),
            ]).finally(() => clearTimeout(idbTimeoutId));
            if (rawData) {
              const parseResult = v.safeParse(StoreSchema, rawData);
              if (parseResult.success) {
                store().items = parseResult.output.items
                  .filter((i) => EAN_PATTERN.test(i.code))
                  .map(normalizeItem);
                for (const item of store().items) {
                  if (nameCache[item.code] && !item.name) {
                    item.name = nameCache[item.code];
                  } else if (!item.name) {
                    emit("barcode:added", { id: item.id, code: item.code });
                  }
                }
                if (store().items.some((i) => !i.name)) {
                  persistQueue.add(() => persistItems(store().items.slice()));
                }
              }
            }
          } catch {}

          const elapsedMs = Date.now() - loadStartTime;
          if (elapsedMs < SKELETON_DURATION) {
            await new Promise((resolve) =>
              setTimeout(resolve, SKELETON_DURATION - elapsedMs),
            );
          }

          store().isLoading = false;
          this.$watch("items.length", () => {
            this._updateClosingConfirmation();
            this.$nextTick(() => this._initSwipeGestures());
          });
          this._updateClosingConfirmation();
          tickInterval = setInterval(() => {
            store().tick++;
          }, 30_000);

          this._searchDebounced = debounce((val) => {
            this._debouncedQuery = val;
          }, 200);
          this.$watch("searchQuery", (val) => this._searchDebounced(val));
          this._cachedEasing = getComputedStyle(document.documentElement)
            .getPropertyValue("--motion-standard")
            .trim();

          this.$nextTick(() => this._initSwipeGestures());
        },

        _applyTheme() {
          const params = tg.themeParams ?? {};
          const bgColor = params.bg_color ?? "#0f1115";
          tg.setHeaderColor?.(params.header_bg_color ?? bgColor);
          tg.setBackgroundColor?.(bgColor);
          store().isDarkScheme = tg.colorScheme === "dark";
        },

        _updateClosingConfirmation() {
          store().items.length > 0
            ? tg.enableClosingConfirmation?.()
            : tg.disableClosingConfirmation?.();
        },

        dismissKeyboard(event) {
          if (!event.target.closest("search") && this.isSearchFocused) {
            this.$refs.searchInput?.blur();
          }
        },

        onSearchFocus(focused) {
          this.isSearchFocused = focused;
          if (focused) {
            this._backButtonHandler = () => {
              this.clearSearch();
              this.$refs.searchInput?.blur();
            };
            tg.BackButton?.onClick(this._backButtonHandler);
            tg.BackButton?.show();
          } else {
            tg.BackButton?.hide();
            if (this._backButtonHandler) {
              tg.BackButton?.offClick(this._backButtonHandler);
              this._backButtonHandler = null;
            }
          }
        },

        clearSearch() {
          this.searchQuery = "";
          this._debouncedQuery = "";
          this._searchDebounced?.cancel();
          this.$refs.searchInput?.blur();
        },

        toggleMultiScan() {
          haptic();
          this.isMultiScan = !this.isMultiScan;
        },

        toggleRenderMode() {
          haptic();
          this.isRenderFlipped = !this.isRenderFlipped;
        },

        _initSwipeGestures() {
          if (this._swipeObserver) {
            this._swipeObserver.disconnect();
            this._swipeObserver = null;
          }

          const listEl = document.querySelector("[role=list]");
          if (!listEl) return;
          const easing = this._cachedEasing || "cubic-bezier(.2,0,0,1)";

          const setupGesture = (wrapper) => {
            if (wrapper.hasAttribute("data-gesture")) return;
            wrapper.setAttribute("data-gesture", "");
            const card = wrapper.querySelector(".barcode-card");
            if (!card) return;
            const gesture = new TinyGesture(card, {
              threshold: (type) => (type === "x" ? 25 : Infinity),
            });
            let offsetX = 0;

            gesture.on("panmove", () => {
              if (gesture.touchMoveX === null) return;
              offsetX = Math.min(0, gesture.touchMoveX);
              card.style.transform = `translateX(${offsetX}px)`;
              card.style.transition = "none";
            });

            gesture.on("panend", () => {
              card.style.transition = `transform 200ms ${easing}`;
              if (offsetX < -80) {
                const id = wrapper.dataset.id;
                if (id) this.removeItem(id);
              } else {
                card.style.transform = "";
              }
              offsetX = 0;
            });
          };

          this._swipeObserver = new MutationObserver(() => {
            listEl
              .querySelectorAll(".swipe-wrapper:not([data-gesture])")
              .forEach(setupGesture);
          });
          this._swipeObserver.observe(listEl, {
            childList: true,
            subtree: true,
          });
          listEl.querySelectorAll(".swipe-wrapper").forEach(setupGesture);
        },

        openScanner() {
          if (this._isScannerOpen) return;
          this._isScannerOpen = true;
          haptic();

          tg.showScanQrPopup(
            {
              text: this.isMultiScan
                ? "Мультискан • Наведите камеру на QR-код ценника"
                : "Наведите камеру на QR-код ценника",
            },
            (scanResult) => {
              if (!scanResult) {
                this._isScannerOpen = false;
                return true;
              }
              return this._processScanResult(scanResult);
            },
          );

          const handlePopupClosed = () => {
            this._isScannerOpen = false;
            tg.offEvent("scanQrPopupClosed", handlePopupClosed);
          };
          tg.onEvent("scanQrPopupClosed", handlePopupClosed);
        },

        _processScanResult(rawData) {
          const parsed = parseCEN(rawData);

          if (!parsed) {
            if (this.isMultiScan) {
              notify("error");
              haptic("medium");
              return false;
            }
            showToast("Только CEN формат", "err");
            notify("error");
            haptic("medium");
            tg.closeScanQrPopup?.();
            this._isScannerOpen = false;
            return true;
          }

          if (store().items.some((i) => i.code === parsed.code)) {
            if (this.isMultiScan) {
              notify("warning");
              haptic("medium");
              return false;
            }
            showToast(`${parsed.code} уже добавлен`, "warn");
            notify("warning");
            tg.closeScanQrPopup?.();
            this._isScannerOpen = false;
            return true;
          }

          notify("success");
          haptic();
          playSuccessSound();
          this._insertItem(parsed);

          if (this.isMultiScan) return false;
          showToast(`${parsed.code} добавлен`);
          tg.closeScanQrPopup?.();
          this._isScannerOpen = false;
          return true;
        },

        _insertItem(parsed) {
          const id = crypto.randomUUID();
          store().items = [
            {
              id,
              code: parsed.code,
              raw: parsed.raw,
              price: formatPrice(parsed.price),
              date: parsed.date,
              name: nameCache[parsed.code] ?? null,
              ts: Date.now(),
              _qrOk: false,
              _qrErr: false,
              _bcOk: false,
              _bcErr: false,
            },
            ...store().items,
          ];
          emit("items:changed");
          persistQueue.add(() => persistItems(store().items.slice()));
          if (!nameCache[parsed.code]) {
            emit("barcode:added", { id, code: parsed.code });
          }
        },

        async removeItem(id) {
          haptic("medium");
          const wrapper = document.querySelector(
            `.swipe-wrapper[data-id="${CSS.escape(id)}"]`,
          );
          if (wrapper) {
            const card = wrapper.querySelector(".barcode-card");
            if (card) {
              await card.animate(
                [
                  { opacity: 1, transform: "translateX(0) scale(1)" },
                  { opacity: 0, transform: "translateX(-30px) scale(0.95)" },
                ],
                {
                  duration: 180,
                  easing: "cubic-bezier(0.2, 0, 0, 1)",
                  fill: "forwards",
                },
              ).finished;
            }
          }
          store().items = store().items.filter((i) => i.id !== id);
          emit("items:changed");
          persistQueue.add(() => persistItems(store().items.slice()));
        },

        async clearAll() {
          haptic("medium");
          if (!(await confirmDialog("Удалить все коды?\nОтменить невозможно.")))
            return;
          const wrappers = [
            ...document.querySelectorAll(".swipe-wrapper[data-id]"),
          ];
          wrappers.forEach((el, i) => {
            el.style.animation = `card-out 120ms var(--motion-standard) ${i * 20}ms forwards`;
          });
          if (wrappers.length)
            await new Promise((r) => setTimeout(r, wrappers.length * 20 + 120));
          store().items = [];
          emit("items:changed");
          persistQueue.add(() => persistItems([]));
          showToast("История очищена");
          notify("success");
        },

        async copyText(text) {
          haptic();
          const success = await navigator.clipboard
            .writeText(text)
            .then(() => true)
            .catch(() => false);
          showToast(
            success ? "Скопировано" : "Ошибка копирования",
            success ? "ok" : "err",
          );
          notify(success ? "success" : "error");
        },

        downloadBarcode(item) {
          haptic();
          tg.downloadFile({
            url: `https://barcodeapi.org/api/${item.code.length === 8 ? "EAN8" : "EAN13"}/${item.code}`,
            file_name: `${item.code}.png`,
          });
        },
      }));

      Alpine.start();
    </script>
  </body>
</html>
